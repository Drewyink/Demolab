<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Setup - Facets Config Lab</title>
<style>
:root{--echo-bg:#f6fbff;--echo-border:#d9e7ff;--echo-text:#0f172a;--echo-muted:#4b5563;--echo-primary:#2563eb;--echo-primary-2:#38bdf8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f0f4f8;padding:20px}
.back-btn{display:inline-block;margin-bottom:20px;padding:10px 20px;background:#fff;border:1px solid var(--echo-border);border-radius:12px;text-decoration:none;color:var(--echo-text);font-weight:700;transition:transform .2s}
.back-btn:hover{transform:translateY(-2px)}
.container{max-width:1400px;margin:0 auto;background:radial-gradient(1200px 600px at 10% 0%,rgba(56,189,248,.18),transparent 55%),radial-gradient(1200px 600px at 90% 0%,rgba(34,197,94,.14),transparent 55%),var(--echo-bg);border:1px solid var(--echo-border);border-radius:18px;padding:30px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
.header{margin-bottom:30px}
.header h1{font-size:32px;font-weight:900;color:var(--echo-text);margin-bottom:8px}
.header p{color:var(--echo-muted);font-size:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#fff;border:1px solid var(--echo-border);border-radius:18px;padding:20px}
.card-title{font-weight:900;color:var(--echo-text);margin-bottom:15px;font-size:18px}
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:12px;font-weight:800;color:var(--echo-muted);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--echo-border);background:rgba(246,251,255,.85);border-radius:12px;padding:10px 12px;outline:0;color:var(--echo-text);font-weight:600;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(37,99,235,.55);box-shadow:0 0 0 4px rgba(56,189,248,.14)}
.inline{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.btn{border:1px solid var(--echo-border);background:#fff;padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:900;color:var(--echo-text);transition:all .2s}
.btn:hover{transform:translateY(-2px)}
.btn-primary{border-color:rgba(37,99,235,.45);background:linear-gradient(135deg,var(--echo-primary),var(--echo-primary-2));color:#fff;box-shadow:0 12px 24px rgba(37,99,235,.22)}
.btn-outline{border-color:rgba(37,99,235,.35);background:rgba(37,99,235,.08);color:#1e40af}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:15px}
.alert{margin-top:20px;border-radius:14px;padding:12px;border:1px solid rgba(37,99,235,.3);background:rgba(37,99,235,.08);font-size:14px;color:var(--echo-text)}
.toast{position:fixed;bottom:20px;right:20px;display:none;border-radius:14px;padding:12px 16px;border:1px solid rgba(37,99,235,.35);background:#fff;box-shadow:0 10px 30px rgba(15,23,42,.15);font-weight:900;color:var(--echo-text);z-index:1000;animation:slideIn .3s ease}
.toast.show{display:block}
@keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
@media (max-width:768px){.grid2{grid-template-columns:1fr}.inline{grid-template-columns:1fr}}
</style>
</head>
<body>
<a href="facets-index.html" class="back-btn">← Back to Home</a>

<div class="container">
  <div class="header">
    <h1>Member Setup</h1>
    <p>Create a realistic member record like a Facets "Member Master" screen.</p>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Identity</div>
      
      <div class="form-group">
        <label>Member ID</label>
        <input id="memberId" placeholder="Auto-generate or enter (e.g., M00012345)"/>
      </div>

      <div class="inline">
        <div class="form-group">
          <label>First Name</label>
          <input id="firstName" placeholder="Drew"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input id="lastName" placeholder="Adeyinka"/>
        </div>
      </div>

      <div class="inline">
        <div class="form-group">
          <label>Date of Birth</label>
          <input id="dob" type="date"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="gender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Non-binary</option>
            <option>Unknown</option>
          </select>
        </div>
      </div>

      <div class="inline">
        <div class="form-group">
          <label>Relationship</label>
          <select id="relationship">
            <option value="Subscriber">Subscriber</option>
            <option value="Spouse">Spouse</option>
            <option value="Child">Child</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="status">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Pending">Pending</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-outline" id="btn-generate">Generate ID</button>
        <button class="btn btn-primary" id="btn-apply">Apply Member</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Contact & Address</div>

      <div class="inline">
        <div class="form-group">
          <label>Phone</label>
          <input id="phone" placeholder="(555) 123-4567"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="email" placeholder="member@email.com"/>
        </div>
      </div>

      <div class="form-group">
        <label>Address Line 1</label>
        <input id="addr1" placeholder="123 Main St"/>
      </div>

      <div class="inline">
        <div class="form-group">
          <label>City</label>
          <input id="city" placeholder="Dallas"/>
        </div>
        <div class="form-group">
          <label>State</label>
          <input id="state" placeholder="TX" maxlength="2"/>
        </div>
        <div class="form-group">
          <label>ZIP</label>
          <input id="zip" placeholder="75201" maxlength="10"/>
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="notes" rows="4" placeholder="Add member notes..."></textarea>
      </div>
    </div>
  </div>

  <div class="alert">
    <strong>Facets-like tip:</strong> Keep member identity stable. Eligibility and coverage changes should create <em>effective-dated</em> rows, not overwrite history.
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function generateId(){return 'M'+Math.floor(100000+Math.random()*900000)}
document.getElementById('btn-generate').addEventListener('click',()=>{document.getElementById('memberId').value=generateId();toast('Member ID Generated')});
document.getElementById('btn-apply').addEventListener('click',()=>{const fn=document.getElementById('firstName').value,ln=document.getElementById('lastName').value,dob=document.getElementById('dob').value;if(!fn||!ln||!dob)return toast('First Name, Last Name, and DOB are required');toast('Member Applied Successfully!')});
</script>
</body>
</html>
